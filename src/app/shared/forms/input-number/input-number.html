<mat-form-field class="form-field" appearance="outline">
  <mat-label>{{ label() }}</mat-label>
  <input matInput type="number" [formField]="formField()" />

  @if (isMinErrorShown()) {
    <mat-error>Minimum is {{ minValue() }}</mat-error>
  } @else if (isRequiredErrorShown()) {
    <mat-error>Required field</mat-error>
  }
</mat-form-field>
